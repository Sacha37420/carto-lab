version: "3.9"

# NOTE IMPORTANT (environnement de ce lab) : le démon Docker ne partage PAS le
# système de fichiers de l'hôte — les bind mounts (./src:/app) ne reflètent rien.
# Tout le code et la config sont donc BAKÉS dans les images (COPY dans les
# Dockerfiles) ; on n'utilise que des volumes NOMMÉS (gérés par le démon).
# Conséquence : toute modif de code nécessite un rebuild (recompose_docker --force).

networks:
  sso-net:
    external: true
    name: sso-lab_sso-net
  dev-net:
    # Réseau partagé du workspace : c'est ici que vit l'instance PostGIS
    # partagée 'postgis' (infra/docker-compose.yml — dev-postgis), séparée de
    # 'postgres' car cette dernière n'a pas l'extension PostGIS (image alpine,
    # cf. infra/docker-compose.yml pour le détail). PostgreSQL n'est jamais
    # publié sur l'hôte ni sur Internet, quelle que soit l'instance.
    external: true
    name: dev-net
  carto-net:
    # Réseau interne privé de l'app : backend/worker <-> redis, et
    # pg_featureserv <-> oauth2-proxy-ogc. Le port PostgreSQL n'est JAMAIS
    # publié (cf. CLAUDE.md / to_do point 5) : l'accès QGIS passe par
    # pg_featureserv derrière Caddy + oauth2-proxy, pas par un port DB brut.
    driver: bridge

volumes:
  # Fichiers rasters importés (GeoTIFF…). Déclaré 'external' pour survivre à
  # `clean2.sh carto-lab` (down --volumes) — la base, elle, vit désormais sur
  # l'instance PostGIS partagée (infra), dont le volume est protégé par
  # clean2.sh comme celui de dev-postgres.
  carto-media:
    external: true
    name: carto-lab_carto-media

services:

  redis:
    image: redis:7-alpine
    container_name: carto-lab-redis
    restart: unless-stopped
    networks:
      - carto-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    container_name: carto-lab-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8091:8000"
    networks:
      - sso-net
      - dev-net
      - carto-net
    volumes:
      # Volume nommé : persistance des fichiers importés (rasters). Pas un bind mount.
      - carto-media:/app/media
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/carto-lab-api/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 8000}}"

  worker:
    build: ./backend
    container_name: carto-lab-worker
    restart: unless-stopped
    env_file: .env
    command: celery -A config worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dev-net   # pour atteindre l'instance PostGIS partagée (postgis:5432)
      - carto-net
    volumes:
      - carto-media:/app/media

  frontend:
    build: ./frontend
    container_name: carto-lab-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "4209:80"
    networks:
      - sso-net
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/carto-lab/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 80}}"

  # ──────────────────────────────────────────────────────────────────────────
  # pg_featureserv — OGC API – Features (lecture seule par nature) sur le schéma
  # carto_public UNIQUEMENT. Se connecte avec le rôle Postgres read-only scopé :
  # il ne voit donc jamais les tables applicatives de carto_lab.
  # AUCUN port publié : accessible uniquement au travers d'oauth2-proxy.
  # (Le port PostGIS n'est jamais exposé — cf. CLAUDE.md / to_do point 5.)
  # ──────────────────────────────────────────────────────────────────────────
  pgfeatureserv:
    image: pramsey/pg_featureserv:latest
    container_name: carto-lab-pgfs
    restart: unless-stopped
    environment:
      # 'postgis' = instance PostGIS partagée (infra/docker-compose.yml,
      # réseau dev-net). Le rôle carto_reader y est scopé au seul schéma
      # carto_public (cf. migration 0006_reader_role.py).
      DATABASE_URL: "postgres://${CARTO_READER_USER:-carto_reader}:${CARTO_READER_PASSWORD}@postgis:5432/${POSTGIS_DB:-gisdb}"
      # URL publique externe → liens HATEOAS corrects derrière Caddy + oauth2-proxy.
      PGFS_SERVER_URLBASE: "https://${DOMAIN}/${OGC_SERVICE_PATH:-carto-ogc}"
      PGFS_PAGING_LIMITDEFAULT: "1000"
      PGFS_PAGING_LIMITMAX: "50000"
    networks:
      - dev-net   # pour atteindre l'instance PostGIS partagée (postgis:5432)
      - carto-net # pour rester joignable par oauth2-proxy-ogc

  # ──────────────────────────────────────────────────────────────────────────
  # oauth2-proxy devant pg_featureserv — même cloisonnement que code-server :
  # session OIDC Keycloak + restriction par groupe (OAUTH2_PROXY_ALLOWED_GROUPS).
  # Client Keycloak 'carto-ogc' créé par : bash carto-lab/setup-ogc-auth.sh
  # ──────────────────────────────────────────────────────────────────────────
  oauth2-proxy-ogc:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: carto-lab-oauth2-ogc
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: "${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM:-ssolab}"
      OAUTH2_PROXY_CLIENT_ID: carto-ogc
      OAUTH2_PROXY_CLIENT_SECRET: "${CARTO_OGC_CLIENT_SECRET}"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_REDIRECT_URL: "https://${DOMAIN}/${OGC_SERVICE_PATH:-carto-ogc}/oauth2/callback"
      OAUTH2_PROXY_COOKIE_SECRET: "${CARTO_OGC_COOKIE_SECRET}"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_ogc"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      # Cloisonnement : mêmes groupes que l'app (verrou en amont, comme code-server).
      OAUTH2_PROXY_ALLOWED_GROUPS: "${KEYCLOAK_REQUIRED_GROUPS:-developers}"
      OAUTH2_PROXY_SCOPE: "openid email profile"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      # ── Accès QGIS ────────────────────────────────────────────────────────
      # QGIS n'a pas de cookie de session : il présente un Bearer token OAuth2.
      # Sans ces deux réglages, oauth2-proxy le redirigerait vers la page de login
      # HTML et QGIS échouerait. Ici, un JWT valide du realm (audience carto-ogc)
      # est accepté directement.
      OAUTH2_PROXY_SKIP_JWT_BEARER_TOKENS: "true"
      OAUTH2_PROXY_EXTRA_JWT_ISSUERS: "${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM:-ssolab}=carto-ogc"
    command:
      - oauth2-proxy
      - --upstream=http://carto-lab-pgfs:9000/
    depends_on:
      - pgfeatureserv
    networks:
      - sso-net
      - carto-net
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/${OGC_SERVICE_PATH:-carto-ogc}/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 4180}}"
      caddy.handle_path.reverse_proxy.header_down: "Location ^/$ /${OGC_SERVICE_PATH:-carto-ogc}/"
